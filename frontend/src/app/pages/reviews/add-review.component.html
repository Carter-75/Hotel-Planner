<section id="add-review">
    <header class="add-review-header">
        <button type="button" class="back-link-btn" (click)="cancel()">← Back</button>
        <h2>Add Review for {{ hotelName() }}</h2>
    </header>

    <form id="add-review-form" (submit)="submitReview(); $event.preventDefault()">
        <div class="form-group">
            <label for="rating">Rating (1-5)</label>
            <select id="rating" name="rating" [(ngModel)]="rating" required>
                <option value="5">5 - Excellent</option>
                <option value="4">4 - Very Good</option>
                <option value="3">3 - Good</option>
                <option value="2">2 - Fair</option>
                <option value="1">1 - Poor</option>
            </select>
        </div>

        <div class="form-group">
            <label for="comment">Message (Optional)</label>
            <textarea id="comment" name="comment" rows="6" placeholder="Tell us about your stay..." [(ngModel)]="comment"></textarea>
        </div>

        <div class="form-actions">
            <button type="button" class="secondary-btn" (click)="cancel()">Discard & Back</button>
            <button type="submit" class="book-btn">Add Review</button>
        </div>
    </form>
</section>
