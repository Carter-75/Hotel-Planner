<section id="banned-view">
    <div class="banned-container card">
        <h2 class="error-heading">Access Denied</h2>
        <p class="error-message">You are banned and can not use this app.</p>
        
        <div class="form-actions">
            <button id="logout-banned" type="button" class="book-btn" (click)="logout()">Logout</button>
        </div>
    </div>
</section>
