<section id="home">
    <div class="search-hero card">
        <h1>Where do you want to go?</h1>

        <form id="main-search-form" (submit)="search(); $event.preventDefault()">
            <div class="search-main">
                <input type="text" id="main-location" name="location" placeholder="Enter city or address..." [(ngModel)]="location">
                <button type="submit" class="book-btn" [disabled]="isLoading()">{{ isLoading() ? 'Searching...' : 'Search' }}</button>
            </div>

            <div class="search-filters">
                <div class="filter-item">
                    <label for="main-rating">Min Stars</label>
                    <select id="main-rating" name="rating" [(ngModel)]="rating">
                        <option [ngValue]="null">Any</option>
                        <option [ngValue]="1">1 Star</option>
                        <option [ngValue]="2">2 Stars</option>
                        <option [ngValue]="3">3 Stars</option>
                        <option [ngValue]="4">4 Stars</option>
                        <option [ngValue]="5">5 Stars</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label for="main-min-price">Min Price</label>
                    <input type="number" id="main-min-price" name="minPrice" [(ngModel)]="minPrice" placeholder="$0">
                </div>
                <div class="filter-item">
                    <label for="main-max-price">Max Price</label>
                    <input type="number" id="main-max-price" name="maxPrice" [(ngModel)]="maxPrice" placeholder="$500+">
                </div>
            </div>
        </form>
    </div>

    <app-search-results 
        [hotels]="hotels()" 
        [isLoading]="isLoading()">
    </app-search-results>
</section>
