<section id="home">
    <div class="hero-section animate-fade-in">
        <div class="hero-content">
            <h1 class="hero-title">Experience the World in <span class="text-primary">Comfort</span></h1>
            <p class="hero-subtitle">Discover and book stays at 50,000+ premium properties worldwide.</p>
            
            <div class="search-container glass">
                <form id="main-search-form" (submit)="search(); $event.preventDefault()">
                    <div class="search-row">
                        <div class="search-input-group">
                            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                            <input type="text" id="main-location" name="location" class="form-input" placeholder="Where are you going?" [(ngModel)]="locationInput">
                        </div>
                        <button type="submit" class="btn-primary" [disabled]="isLoading()">
                            {{ isLoading() ? 'Searching...' : 'Search' }}
                        </button>
                    </div>

                    <div class="filter-row">
                        <div class="filter-group">
                            <label class="label-title">Min Rating</label>
                            <select id="main-rating" name="rating" class="form-input" [(ngModel)]="ratingInput">
                                <option [ngValue]="null">Any</option>
                                <option [ngValue]="1">1+ Stars</option>
                                <option [ngValue]="2">2+ Stars</option>
                                <option [ngValue]="3">3+ Stars</option>
                                <option [ngValue]="4">4+ Stars</option>
                                <option [ngValue]="5">5 Stars</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="label-title">Min Price</label>
                            <input type="number" id="main-min-price" name="minPrice" class="form-input" [(ngModel)]="minPriceInput" placeholder="$0">
                        </div>
                        <div class="filter-group">
                            <label class="label-title">Max Price</label>
                            <input type="number" id="main-max-price" name="maxPrice" class="form-input" [(ngModel)]="maxPriceInput" placeholder="$1000+">
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="results-container">
        @if (hotels().length > 0) {
            <div class="results-header animate-fade-in">
                <h2 class="results-title">
                    Available Properties 
                    <span class="results-count">({{ totalResults() }})</span>
                </h2>
            </div>
        }
        
        <app-search-results 
            [hotels]="dataSource" 
            [totalResults]="totalResults()"
            [isLoading]="isLoading()"
            (nearEnd)="loadMore()"
            (scrollIndexChange)="onScrollIndexChange($event)"
            (scrollOffsetChange)="onScrollOffsetChange($event)">
        </app-search-results>
    </div>
</section>
