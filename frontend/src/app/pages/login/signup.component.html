<div class="auth-page">
    <div class="auth-card glass">
        <div class="welcome-badge">✨ Welcome!</div>
        <h1 class="auth-title">Complete Your Profile</h1>
        <p class="auth-subtitle">We just need a few more details to set up your account.</p>

        <form (submit)="signup(); $event.preventDefault()" class="signup-form">
            <div class="form-row">
                <div class="form-group">
                    <label class="label-title">First Name</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        name="firstName" 
                        required 
                        [(ngModel)]="firstName" 
                        placeholder="e.g. John">
                </div>

                <div class="form-group">
                    <label class="label-title">Last Name</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        name="lastName" 
                        required 
                        [(ngModel)]="lastName" 
                        placeholder="e.g. Doe">
                </div>
            </div>

            <div class="auth-footer">
                <button type="submit" class="btn-primary w-full">Finish Registration</button>
                <div class="auth-links">
                    <span class="text-muted">Changed your mind?</span>
                    <a routerLink="/login" class="auth-link">Start Over</a>
                </div>
            </div>
        </form>
    </div>
</div>
