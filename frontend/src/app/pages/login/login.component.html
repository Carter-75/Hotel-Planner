<section class="auth-page animate-fade-in">
    <div class="auth-card glass">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Enter your credentials to login or get started.</p>

        <form id="login-form" (submit)="login(); $event.preventDefault()">
            <div class="form-group">
                <label class="label-title" for="login-email">Email Address</label>
                <input type="email" id="login-email" name="email" class="form-input" required [(ngModel)]="email" placeholder="name@example.com">
            </div>

            <div class="form-group">
                <label class="label-title" for="login-password">Password</label>
                <input type="password" id="login-password" name="password" class="form-input" required [(ngModel)]="password" placeholder="••••••••">
            </div>

            <div class="auth-footer">
                <button type="submit" class="btn-primary w-full">Login / Sign Up</button>
                <div class="auth-links">
                    <a routerLink="/forgot-password" class="auth-link">Forgot password?</a>
                </div>
            </div>
        </form>
    </div>
</section>
