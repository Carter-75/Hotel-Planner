<section id="login">
    <div class="login-container card">
        <h2>Login</h2>

        <form id="login-form" (submit)="login(); $event.preventDefault()">
            <div class="form-group">
                <label for="login-email">Enter email</label>
                <input type="email" id="login-email" name="email" required [(ngModel)]="email">
            </div>

            <div class="form-group">
                <label for="login-password">Enter password</label>
                <input type="password" id="login-password" name="password" required [(ngModel)]="password">
            </div>

            <div class="form-actions">
                <button type="button" class="secondary-btn" routerLink="/forgot-password">Forgot Password</button>
                <button type="submit" class="book-btn">Login / Sign up</button>
            </div>
        </form>
    </div>
</section>
