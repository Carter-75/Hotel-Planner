<section id="hotel-admin">
    <h2 id="hotel-admin-title">Hotel Admin</h2>

    <!-- if editing, we'll show the current card here -->
    <article id="current-hotel-card" class="hotel-card" hidden>
        <!-- header populated by JS when editing -->
    </article>

    <form id="hotel-admin-form" (submit)="saveHotel(); $event.preventDefault()">
        <!-- hidden input for editing existing hotels -->
        <input type="hidden" id="hotel-id" name="id" [(ngModel)]="hotelId">

        <h3>{{ isEditing() ? 'Edit Hotel' : 'Add New Hotel' }}</h3>

        <div>
            <label for="hotel-name">Name</label>
            <input type="text" id="hotel-name" name="name" required [(ngModel)]="name">
        </div>
        <div>
            <label for="hotel-address">Address</label>
            <input type="text" id="hotel-address" name="address" required [(ngModel)]="address">
        </div>
        <div>
            <label for="hotel-stars">Stars</label>
            <input type="number" id="hotel-stars" name="stars" step="0.1" min="1" max="5" required [(ngModel)]="stars">
        </div>
        <div>
            <label for="hotel-price">Price</label>
            <input type="number" id="hotel-price" name="price" min="0" required [(ngModel)]="price">
        </div>
        <div>
            <label for="hotel-amenities">Amenities</label>
            <input type="text" id="hotel-amenities" name="amenities" placeholder="wifi, pool, etc." [(ngModel)]="amenities">
        </div>
        <div>
            <label for="hotel-description">Description</label>
            <textarea id="hotel-description" name="description" rows="4" [(ngModel)]="description"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" id="hotel-admin-save-btn">{{ isEditing() ? 'Update Hotel' : 'Save Hotel' }}</button>
            @if (isEditing()) {
                <button type="button" (click)="resetForm()">Cancel</button>
            }
        </div>
    </form>

    <hr>

    <h3>Manage Existing Hotels</h3>
    <div id="admin-hotels-list" class="results-container">
        @for (hotel of hotels(); track hotel._id) {
            <article class="hotel-card admin">
                <div class="hotel-info">
                    <h4>{{ hotel.name }}</h4>
                    <p>{{ hotel.address }}</p>
                </div>
                <div class="hotel-actions">
                    <button type="button" (click)="editHotel(hotel)">Edit</button>
                    <button type="button" class="delete-btn" (click)="deleteHotel(hotel._id)">Delete</button>
                </div>
            </article>
        } @empty {
            <p>No hotels found. Add one above!</p>
        }
    </div>
    
    <button type="button" class="back-link" routerLink="/home">Back</button>
</section>
