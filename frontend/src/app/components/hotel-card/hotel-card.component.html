<article class="hotel-card card" (click)="goToDetails()">
    <div class="hotel-header">
        <div class="hotel-info">
            <h3 class="hotel-name">{{ hotel.name }}</h3>
            <p class="hotel-location">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="11" r="3"></circle></svg>
                {{ hotel.address }}
            </p>
        </div>
        <div class="hotel-rating">
            <span class="rating-value">{{ hotel.mergedRating || hotel.stars | number:'1.1-1' }}</span>
            @if (hotel.apiReviewCount > 0) {
                <div class="api-indicator" title="Verified API Data">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </div>
            }
        </div>
    </div>

    <div class="hotel-amenities">
        @for (item of hotel.amenities.slice(0, 3); track item) {
            <span class="amenity-tag">{{ item }}</span>
        }
        @if (hotel.amenities.length > 3) {
            <span class="amenity-more">+{{ hotel.amenities.length - 3 }}</span>
        }
    </div>

    <div class="hotel-footer">
        <div class="price-section">
            <span class="price-amount">${{ hotel.price }}</span>
            <span class="price-period">/ night</span>
        </div>
        <div class="card-actions">
            <button class="btn-icon" [class.is-saved]="isSaved()" (click)="toggleSave($event)">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" [attr.fill]="isSaved() ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </button>
            <button class="btn-primary-sm">Details</button>
        </div>
    </div>
</article>
