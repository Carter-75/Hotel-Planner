<div class="search-results-wrapper">
  <app-hotel-list 
      [hotels]="hotels" 
      [totalResults]="totalResults"
      [emptyMessage]="isLoading ? 'Finding the best hotels for you...' : 'No hotels found for your search. Try different filters!'"
      (nearEnd)="nearEnd.emit()"
      (scrollIndexChange)="scrollIndexChange.emit($event)"
      (scrollOffsetChange)="scrollOffsetChange.emit($event)">
  </app-hotel-list>
</div>
