<header class="navbar-wrapper glass">
    <div class="navbar-container">
        <div class="brand" routerLink="/home">
            <span class="brand-name">Hotel<span class="text-primary">Planner</span></span>
        </div>

        <nav class="nav-links">
            <a routerLink="/home" routerLinkActive="active" class="nav-link">Home</a>
            @if (authService.isAuthenticated()) {
                <a routerLink="/saved" routerLinkActive="active" class="nav-link">Saves</a>
                @if (authService.isAdmin()) {
                    <a routerLink="/admin/users" routerLinkActive="active" class="nav-link">Users</a>
                }
            }
        </nav>

        <div class="user-actions">
            @if (authService.isAuthenticated()) {
                <div class="user-profile">
                    <div class="user-details">
                        <span class="user-name">Hi, {{ authService.currentUser()?.firstName }}</span>
                        <span class="user-email">{{ authService.currentUser()?.email }}</span>
                    </div>
                    <button class="btn-logout" (click)="authService.logout()" title="Logout">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    </button>
                </div>
            } @else {
                <a routerLink="/login" class="btn-primary">Sign In</a>
            }
        </div>
    </div>
</header>
